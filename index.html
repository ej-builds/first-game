<!DOCTYPE html>
<html lang="en">
<!--
  ===================================================================
  BATTLE BASH — SKELETON BUILD
  ===================================================================
  Purpose: known-good fallback for EJ's Wednesday core build session.
  If we hit a wall and can't unstick it by ~11:30, switch to this and
  frame it as "here's a starting point we can build on" — not as a fallback.

  What works out of the box:
  - 2 creatures with HP, Attack, Speed, and one of 3 types
  - 2 attack moves per creature with type and power
  - Type effectiveness (Fire > Grass > Water > Fire)
  - Turn order resolved by Speed stat
  - Damage applied, HP bars update, win state triggers
  - "Play again" button resets

  What's deliberately left thin (good places for EJ to customise):
  - Visual style is minimal — no sprites, just coloured cards
  - No animations beyond a brief shake on hit
  - Two creatures only — adding a third is a meaningful extension
  - Type chart is a stub — could be expanded to 5-6 types
  - No status effects, items, switching, or AI personality
  - Creature names are placeholder

  Stefan: scan the JS once before Tuesday so you can speak to it
  fluently if we use it. The combat resolution is in `resolveAttack()`.
  ===================================================================
-->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Battle Bash</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Gill+Sans:wght@400;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a2e;
      --bg-2: #16213e;
      --text: #f5efd6;
      --text-muted: #8e93b2;

      --fire:  #f08030;
      --water: #6890f0;
      --grass: #78c850;

      --fire-light:  #fde4c8;
      --water-light: #d0dcff;
      --grass-light: #d4f0c0;

      --fire-mid:  #f5c09a;
      --water-mid: #a8bef8;
      --grass-mid: #b0dfa0;

      --hp-good: #7ac74c;
      --hp-warn: #ffcb05;
      --hp-low:  #ee3142;
    }

    body {
      background: radial-gradient(ellipse at top, #2a2060 0%, #1a1a2e 60%);
      color: var(--text);
      font-family: 'Gill Sans', 'Gill Sans MT', Calibri, system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 4px;
      letter-spacing: 0.04em;
      text-shadow: 0 0 20px rgba(255,203,5,0.4);
      color: #ffcb05;
    }

    .subtitle {
      color: var(--text-muted);
      margin-bottom: 40px;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .arena {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 32px;
      align-items: center;
      max-width: 900px;
      width: 100%;
      margin-bottom: 32px;
    }

    @media (max-width: 700px) {
      .arena { grid-template-columns: 1fr; gap: 20px; }
    }

    /* ── Pokémon Card Shell ── */
    .creature-card {
      border-radius: 16px;
      padding: 4px;
      position: relative;
      transition: transform 200ms;
      /* gold foil outer border */
      background: linear-gradient(145deg, #e8c840 0%, #b8962a 40%, #f0d060 60%, #c8a830 100%);
      box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,220,80,0.3);
    }

    /* type-colored inner card */
    .creature-card .card-inner {
      border-radius: 13px;
      overflow: hidden;
      position: relative;
    }

    /* subtle holographic shimmer overlay */
    .creature-card .card-inner::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg,
        rgba(255,255,255,0.08) 0%,
        transparent 40%,
        rgba(255,255,255,0.05) 60%,
        transparent 100%);
      pointer-events: none;
      border-radius: 13px;
    }

    /* fire card */
    .creature-card.type-fire .card-inner {
      background: linear-gradient(160deg, #fde4c8 0%, #f5c09a 35%, #f08030 100%);
    }
    /* water card */
    .creature-card.type-water .card-inner {
      background: linear-gradient(160deg, #d0dcff 0%, #a8bef8 35%, #6890f0 100%);
    }
    /* grass card */
    .creature-card.type-grass .card-inner {
      background: linear-gradient(160deg, #d4f0c0 0%, #b0dfa0 35%, #78c850 100%);
    }

    .creature-card.hit {
      animation: shake 300ms ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0) rotate(0deg); }
      25%       { transform: translateX(-8px) rotate(-1deg); }
      75%       { transform: translateX(8px) rotate(1deg); }
    }

    .creature-card.fainted {
      opacity: 0.35;
      filter: grayscale(1);
    }

    /* ── Card Header ── */
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 12px 14px 8px;
    }

    .creature-name {
      font-size: 18px;
      font-weight: 700;
      color: #1a1000;
      letter-spacing: 0.01em;
      line-height: 1.1;
    }

    .card-hp-display {
      font-size: 22px;
      font-weight: 700;
      color: #1a1000;
      text-align: right;
      line-height: 1;
    }

    .card-hp-display .hp-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      opacity: 0.6;
    }

    /* ── Creature Illustration Area ── */
    .card-art {
      margin: 0 10px 8px;
      border-radius: 8px;
      height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 72px;
      position: relative;
      overflow: hidden;
      border: 2px solid rgba(0,0,0,0.15);
      background: rgba(255,255,255,0.25);
    }

    .card-art::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.3) 0%, transparent 60%);
    }

    /* ── Type + Stats strip ── */
    .card-type-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px 8px;
    }

    .type-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px 3px 7px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #fff;
      border: 1.5px solid rgba(0,0,0,0.2);
    }

    .type-badge.fire  { background: #c03010; }
    .type-badge.water { background: #3050c0; }
    .type-badge.grass { background: #3a8a20; }
    .type-badge.basic { background: #7a7a8a; }

    .type-badge::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.6);
      display: inline-block;
    }

    .card-stats-strip {
      display: flex;
      gap: 12px;
      font-size: 11px;
      font-weight: 600;
      color: rgba(0,0,0,0.55);
    }

    .card-stats-strip strong { color: #1a1000; }

    /* ── HP Bar (inside card) ── */
    .card-hp-row {
      padding: 0 14px 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hp-bar-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: rgba(0,0,0,0.5);
      white-space: nowrap;
    }

    .hp-bar {
      flex: 1;
      height: 10px;
      background: rgba(0,0,0,0.15);
      border-radius: 5px;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.2);
    }

    .hp-fill {
      height: 100%;
      background: var(--hp-good);
      border-radius: 5px;
      transition: width 400ms ease, background 200ms;
      box-shadow: 0 0 4px rgba(122,199,76,0.6);
    }

    .hp-fill.warn {
      background: var(--hp-warn);
      box-shadow: 0 0 4px rgba(255,203,5,0.6);
    }

    .hp-fill.low {
      background: var(--hp-low);
      box-shadow: 0 0 4px rgba(238,49,66,0.6);
    }

    /* ── Moves Section ── */
    .card-moves-section {
      background: rgba(0,0,0,0.08);
      border-top: 1px solid rgba(0,0,0,0.12);
      padding: 10px 10px 12px;
    }

    .moves {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .move-btn {
      background: rgba(255,255,255,0.55);
      color: #1a1000;
      border: 1.5px solid rgba(0,0,0,0.18);
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      transition: all 150ms;
      text-align: left;
      backdrop-filter: blur(4px);
    }

    .move-btn:hover:not(:disabled) {
      background: rgba(255,255,255,0.85);
      border-color: rgba(0,0,0,0.35);
      transform: translateY(-1px);
    }

    .move-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .move-name { display: block; font-weight: 700; font-size: 12px; }
    .move-meta { display: block; font-size: 10px; color: rgba(0,0,0,0.5); margin-top: 2px; font-weight: 600; letter-spacing: 0.04em; }

    /* ── VS divider ── */
    .vs {
      font-size: 28px;
      font-weight: 700;
      color: #ffcb05;
      text-shadow: 0 0 12px rgba(255,203,5,0.5);
      text-align: center;
    }

    /* ── Battle Log ── */
    .log {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 16px 20px;
      max-width: 900px;
      width: 100%;
      min-height: 80px;
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-muted);
      backdrop-filter: blur(4px);
    }

    .log-line { margin-bottom: 4px; }
    .log-line:last-child { color: var(--text); margin-bottom: 0; }
    .log-line.effective { color: var(--hp-good); }
    .log-line.weak { color: var(--hp-low); }
    .log-line.win { color: var(--hp-warn); font-weight: 600; }

    .play-again {
      margin-top: 24px;
      background: #ffcb05;
      color: #1a1000;
      border: none;
      padding: 12px 32px;
      font-size: 15px;
      font-weight: 700;
      border-radius: 24px;
      cursor: pointer;
      font-family: inherit;
      display: none;
      letter-spacing: 0.04em;
      box-shadow: 0 4px 16px rgba(255,203,5,0.4);
    }

    .play-again.visible { display: inline-block; }
    .play-again:hover { background: #ffd83a; transform: translateY(-1px); }
  </style>
</head>
<body>

  <h1>Battle Bash</h1>
  <p class="subtitle">Skeleton build · v0.1</p>

  <div class="arena">
    <!-- Player creature -->
    <div class="creature-card type-fire" id="card-player">
      <div class="card-inner">
        <div class="card-header">
          <div class="creature-name" id="name-player">Cinderfox</div>
          <div class="card-hp-display">
            <span id="hp-player">100</span><span class="hp-label"> HP</span>
          </div>
        </div>
        <div class="card-art" id="art-player">🦊</div>
        <div class="card-type-row">
          <span class="type-badge fire" id="type-player">Fire</span>
          <div class="card-stats-strip">
            <span>ATK <strong id="atk-player">12</strong></span>
            <span>SPD <strong id="spd-player">9</strong></span>
          </div>
        </div>
        <div class="card-hp-row">
          <span class="hp-bar-label">HP</span>
          <div class="hp-bar"><div class="hp-fill" id="hpbar-player" style="width:100%"></div></div>
        </div>
        <div class="card-moves-section">
          <div class="moves" id="moves-player"></div>
        </div>
      </div>
    </div>

    <div class="vs">VS</div>

    <!-- Opponent creature -->
    <div class="creature-card type-water" id="card-opponent">
      <div class="card-inner">
        <div class="card-header">
          <div class="creature-name" id="name-opponent">Tidepup</div>
          <div class="card-hp-display">
            <span id="hp-opponent">100</span><span class="hp-label"> HP</span>
          </div>
        </div>
        <div class="card-art" id="art-opponent">🐶</div>
        <div class="card-type-row">
          <span class="type-badge water" id="type-opponent">Water</span>
          <div class="card-stats-strip">
            <span>ATK <strong id="atk-opponent">10</strong></span>
            <span>SPD <strong id="spd-opponent">7</strong></span>
          </div>
        </div>
        <div class="card-hp-row">
          <span class="hp-bar-label">HP</span>
          <div class="hp-bar"><div class="hp-fill" id="hpbar-opponent" style="width:100%"></div></div>
        </div>
        <div class="card-moves-section">
          <div class="moves" id="moves-opponent"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="log" id="log">
    <div class="log-line">A wild Tidepup appeared! Pick your move.</div>
  </div>

  <button class="play-again" id="playAgain" onclick="resetBattle()">Play again</button>

  <script>
    // =====================================================
    // GAME DATA — easy to extend
    // =====================================================

    // Type effectiveness chart.
    // Fire > Grass > Water > Fire (and same-type = neutral)
    // basic always hits for exactly the listed power — no multiplier
    const typeChart = {
      fire:  { fire: 1.0, grass: 2.0, water: 0.5, basic: 1.0 },
      grass: { fire: 0.5, grass: 1.0, water: 2.0, basic: 1.0 },
      water: { fire: 2.0, grass: 0.5, water: 1.0, basic: 1.0 },
      basic: { fire: 1.0, grass: 1.0, water: 1.0, basic: 1.0 }
    };

    // Two starting creatures. Each has 2 moves.
    const creatures = {
      player: {
        name: 'Cinderfox',
        type: 'fire',
        maxHp: 100,
        atk: 12,
        spd: 9,
        moves: [
          { name: 'Ember Snap',  type: 'fire',  power: 14 },
          { name: 'Bite',        type: 'basic', power: 10 }
        ]
      },
      opponent: {
        name: 'Tidepup',
        type: 'water',
        maxHp: 100,
        atk: 10,
        spd: 7,
        moves: [
          { name: 'Splash Strike', type: 'water', power: 14 },
          { name: 'Tackle',        type: 'basic', power: 10 }
        ]
      }
    };

    // =====================================================
    // GAME STATE
    // =====================================================
    let state = null;

    function initState() {
      state = {
        player: { ...creatures.player, hp: creatures.player.maxHp },
        opponent: { ...creatures.opponent, hp: creatures.opponent.maxHp },
        turn: 'pending',   // 'player', 'opponent', or 'pending' between rounds
        over: false
      };
    }

    // =====================================================
    // RENDERING
    // =====================================================
    const creatureEmoji = { fire: '🦊', water: '🐶', grass: '🌿' };

    function render() {
      ['player', 'opponent'].forEach(side => {
        const c = state[side];
        document.getElementById(`name-${side}`).textContent = c.name;
        document.getElementById(`hp-${side}`).textContent = Math.max(0, c.hp);
        document.getElementById(`atk-${side}`).textContent = c.atk;
        document.getElementById(`spd-${side}`).textContent = c.spd;

        const typeBadge = document.getElementById(`type-${side}`);
        typeBadge.textContent = c.type.charAt(0).toUpperCase() + c.type.slice(1);
        typeBadge.className = `type-badge ${c.type}`;

        const card = document.getElementById(`card-${side}`);
        card.className = `creature-card type-${c.type}`;
        card.classList.toggle('fainted', c.hp <= 0);

        // HP bar
        const hpPct = Math.max(0, c.hp) / c.maxHp * 100;
        const hpFill = document.getElementById(`hpbar-${side}`);
        hpFill.style.width = `${hpPct}%`;
        hpFill.className = 'hp-fill';
        if (hpPct < 25) hpFill.classList.add('low');
        else if (hpPct < 50) hpFill.classList.add('warn');
      });

      renderMoves();
    }

    function renderMoves() {
      const container = document.getElementById('moves-player');
      container.innerHTML = '';
      state.player.moves.forEach((move, i) => {
        const btn = document.createElement('button');
        btn.className = 'move-btn';
        btn.innerHTML = `
          <span class="move-name">${move.name}</span>
          <span class="move-meta">${move.type.toUpperCase()} · POWER ${move.power}</span>
        `;
        btn.disabled = state.over || state.player.hp <= 0;
        btn.onclick = () => playerMove(i);
        container.appendChild(btn);
      });

      // Show opponent moves as read-only info
      const oppContainer = document.getElementById('moves-opponent');
      oppContainer.innerHTML = '';
      state.opponent.moves.forEach(move => {
        const btn = document.createElement('button');
        btn.className = 'move-btn';
        btn.disabled = true;
        btn.innerHTML = `
          <span class="move-name">${move.name}</span>
          <span class="move-meta">${move.type.toUpperCase()} · POWER ${move.power}</span>
        `;
        oppContainer.appendChild(btn);
      });
    }

    // =====================================================
    // LOG
    // =====================================================
    function log(text, cls = '') {
      const el = document.getElementById('log');
      const line = document.createElement('div');
      line.className = `log-line ${cls}`;
      line.textContent = text;
      el.appendChild(line);
      // Keep log to most recent 5 lines
      while (el.children.length > 5) el.removeChild(el.firstChild);
    }

    // =====================================================
    // CORE COMBAT — the bit EJ will look at most
    // =====================================================
    function resolveAttack(attackerSide, defenderSide, moveIdx) {
      const attacker = state[attackerSide];
      const defender = state[defenderSide];
      const move = attacker.moves[moveIdx];

      // Basic type always deals exactly move.power — no stat scaling, no type modifier
      let damage, effectiveness;
      if (move.type === 'basic') {
        damage = move.power;
        effectiveness = 1.0;
      } else {
        damage = Math.round((attacker.atk + move.power) / 2);
        effectiveness = typeChart[move.type][defender.type];
        damage = Math.round(damage * effectiveness);
      }

      defender.hp -= damage;

      // Card shake
      const card = document.getElementById(`card-${defenderSide}`);
      card.classList.add('hit');
      setTimeout(() => card.classList.remove('hit'), 300);

      log(`${attacker.name} used ${move.name}! Dealt ${damage} damage.`);

      if (effectiveness > 1) log("It's super effective!", 'effective');
      else if (effectiveness < 1) log("It's not very effective...", 'weak');

      if (defender.hp <= 0) {
        defender.hp = 0;
        log(`${defender.name} fainted!`, 'win');
        log(`${attacker.name} wins the battle.`, 'win');
        state.over = true;
        document.getElementById('playAgain').classList.add('visible');
      }
    }

    // =====================================================
    // TURN LOGIC
    // =====================================================
    function playerMove(moveIdx) {
      if (state.over) return;

      // Resolve turn order by Speed (player first if tied)
      const playerFirst = state.player.spd >= state.opponent.spd;

      const playerMove = moveIdx;
      const opponentMove = pickOpponentMove();

      if (playerFirst) {
        resolveAttack('player', 'opponent', playerMove);
        if (!state.over) {
          setTimeout(() => {
            resolveAttack('opponent', 'player', opponentMove);
            render();
          }, 700);
        }
      } else {
        resolveAttack('opponent', 'player', opponentMove);
        if (!state.over) {
          setTimeout(() => {
            resolveAttack('player', 'opponent', playerMove);
            render();
          }, 700);
        }
      }

      render();
    }

    // Dead-simple AI: pick a random move.
    // (Good place for EJ to add smarter logic — e.g. prefer super-effective moves.)
    function pickOpponentMove() {
      return Math.floor(Math.random() * state.opponent.moves.length);
    }

    // =====================================================
    // INIT / RESET
    // =====================================================
    function resetBattle() {
      initState();
      document.getElementById('log').innerHTML =
        `<div class="log-line">A wild ${state.opponent.name} appeared! Pick your move.</div>`;
      document.getElementById('playAgain').classList.remove('visible');
      render();
    }

    // Start
    initState();
    render();
  </script>
</body>
</html>
